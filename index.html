   <script>
    const tela = document.getElementById("tela");
    let numero = 1;

    function alterarImagem() {
        setTimeout (() => {
            tela.src = 'file:///Y:/WEBCRI-ENZO_SILVA/cadastro instagram/imagens/screenshot' + numero + '.png';

            numero++;

            if(numero == 5) {
                numero = 1;
            }

            alterarImagem();
         },  "2500");  
    }

    alterarImagem();
   </script>
